name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install git-cliff
        run: |
          curl -sSfL \
            https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-musl.tar.gz \
            | tar -xz --strip-components=1 -C /tmp
          sudo mv /tmp/git-cliff /usr/local/bin/git-cliff

      - name: Generate release notes
        run: git cliff --current --output RELEASE_NOTES.md

      - name: Update changelog
        run: |
          git cliff --output changelog.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git add changelog.md
          git commit -m "chore: update changelog for ${{ github.ref_name }}" || true
          git push origin main

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Janus ${{ github.ref_name }}"
          body_path: RELEASE_NOTES.md
